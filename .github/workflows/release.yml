name: Release to stores

# Every push to main auto-increments the patch version (based on the latest
# vX.Y.Z git tag), stamps it into manifest.json/package.json, builds, commits
# the bump back to main with a new tag, then submits to both stores.
#
# The bump commit is tagged "[skip ci]" so it does NOT retrigger this workflow
# (otherwise every release would loop forever).
on:
  push:
    branches: [main]
  # Manual run: builds and submits using the version ALREADY in the manifest,
  # with no auto-bump, no commit, and no tag. Use it to re-run publishing or
  # test the pipeline. NOTE: the stores reject re-submitting an existing
  # version, so a manual run only reaches the stores if the committed manifest
  # version is higher than what's currently live.
  workflow_dispatch:
    inputs:
      chrome:
        description: Submit to Chrome Web Store
        type: boolean
        default: true
      firefox:
        description: Submit to Firefox AMO
        type: boolean
        default: true

permissions:
  contents: write   # needed to push the version-bump commit + tag back to main

# Serialize releases so two quick pushes can't both compute the same next
# version and collide; queue rather than cancel so no push is silently dropped.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history + tags to find the latest
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: publish the version already in the manifest, no bump.
            NEXT=$(node -p "require('./public/manifest.json').version")
            echo "Manual run; using existing manifest version $NEXT"
          else
            # Push to main: auto-increment the patch from the latest tag.
            LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              BASE=$(node -p "require('./public/manifest.json').version")
              echo "No existing tag; seeding from manifest version $BASE"
            else
              BASE="${LATEST#v}"
              echo "Latest tag is $LATEST"
            fi
            IFS=. read -r MA MI PA <<< "$BASE"
            NEXT="$MA.$MI.$((PA + 1))"
            echo "Next version: $NEXT"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Stamp version into manifest + package.json
        run: node scripts/set-version.mjs "${{ steps.ver.outputs.version }}"

      - run: npm run build

      - name: Zip dist
        run: cd dist && zip -r ../extension.zip . && cd ..

      # Record the new version as a TAG ONLY - never a commit on main. We make a
      # local commit purely so the version bump is captured in the tagged tree
      # (and in the source archive below), then push only the tag. Pushing a tag
      # uploads the commit object it points to without moving main, so there is
      # nothing for the developer to pull and no merge-commit loop. Tag pushes
      # also don't match this workflow's `push: branches` trigger, so no re-run.
      - name: Tag version bump (no commit to main)
        if: github.event_name == 'push'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/manifest.json package.json
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      # AMO requires human-readable source for bundled/minified extensions.
      # git archive of the (now bump-committed) HEAD gives a clean snapshot of
      # exactly the tracked files - no node_modules, no dist - so reviewers can
      # reproduce the build with `npm ci && npm run build`. It matches the
      # submitted version because we archive AFTER the bump commit.
      - name: Build source archive for AMO
        run: git archive --format=zip -o source.zip HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: |
            extension.zip
            source.zip
            dist

  chrome:
    needs: build
    runs-on: ubuntu-latest
    # On a push, always run; on a manual run, only if its checkbox was ticked.
    if: github.event_name != 'workflow_dispatch' || inputs.chrome
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      # Omitting the sub-command makes the CLI BOTH upload and publish. (There is
      # no --auto-publish flag; `upload` alone only leaves a draft, and passing
      # an unknown flag is what made the first run fail.)
      - name: Upload + publish to Chrome Web Store
        run: |
          npx --yes chrome-webstore-upload-cli@4 \
            --source extension.zip
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  firefox:
    needs: build
    runs-on: ubuntu-latest
    # On a push, always run; on a manual run, only if its checkbox was ticked.
    if: github.event_name != 'workflow_dispatch' || inputs.firefox
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      # web-ext submits to the AMO "listed" channel (the public store).
      #  --approval-timeout=0  : submit and exit immediately instead of blocking
      #                          the whole job polling AMO's review queue. AMO
      #                          still reviews/publishes on its side afterwards.
      #  --upload-source-code  : attach the source archive (built from tracked
      #                          files) so AMO's review of our bundled JS passes
      #                          without a manual source request.
      - name: Submit to Firefox AMO
        run: |
          npx --yes web-ext@latest sign \
            --channel=listed \
            --source-dir=dist \
            --upload-source-code=source.zip \
            --approval-timeout=0 \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
