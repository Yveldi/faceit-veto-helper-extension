<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Faceit Veto Helper</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 300px;
        background-color: #0d0e13;
        color: #e7e8ec;
        font-family: sans-serif;
        font-size: 14px;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 14px;
      }
      h1 .accent {
        color: #ff5500;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 12px 0;
      }
      .title {
        display: block;
        font-weight: 600;
      }
      .desc {
        display: block;
        font-size: 12px;
        color: #8a8c94;
        margin-top: 2px;
      }
      hr {
        border: none;
        border-top: 1px solid #23252f;
        margin: 14px 0;
      }
      .sub {
        margin: 12px 0;
      }
      .sub.disabled {
        opacity: 0.4;
      }
      .delay-head {
        display: flex;
        justify-content: space-between;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .delay-val b {
        color: #ff5500;
      }
      input[type="range"] {
        width: 100%;
        accent-color: #ff5500;
        cursor: pointer;
      }
      /* toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background-color: #23252f;
        border-radius: 22px;
        transition: background-color 0.15s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: #e7e8ec;
        border-radius: 50%;
        transition: transform 0.15s;
      }
      .switch input:checked + .slider {
        background-color: #ff5500;
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h1>Faceit <span class="accent">Veto Helper</span></h1>

    <div class="row">
      <div>
        <span class="title">Auto accept</span>
        <span class="desc">Accept match-ready popups automatically</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="autoAcceptEnabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="sub" id="delayRow">
      <div class="delay-head">
        <span>Accept delay</span>
        <span class="delay-val"><b id="delayValue">10</b>s</span>
      </div>
      <input
        type="range"
        id="autoAcceptDelay"
        min="1"
        max="27"
        step="1"
        value="10"
      />
    </div>

    <hr />

    <div class="row">
      <div>
        <span class="title">Veto helper</span>
        <span class="desc">Win probabilities &amp; player stats in rooms</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="vetoHelperEnabled" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <div>
        <span class="title">Veto Regret Helper&trade;</span>
        <span class="desc">
          In one-map lobbies, show the full pool anyway, so you can see your
          win probability on the maps you can't play
        </span>
      </div>
      <label class="switch">
        <input type="checkbox" id="regretHelperEnabled" />
        <span class="slider"></span>
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
